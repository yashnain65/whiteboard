<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yash Pro Whiteboard v2.0</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/fabric.js/5.3.1/fabric.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-container">
    <aside class="toolbar">
        <div class="logo">YB</div>
        <button id="selectPtr" class="tool-btn active" title="Select Tool"><i class="fas fa-mouse-pointer"></i></button>
        <button id="brushBtn" class="tool-btn" title="Brush Tool"><i class="fas fa-paint-brush"></i></button>
        <button id="rectBtn" class="tool-btn" title="Rectangle"><i class="far fa-square"></i></button>
        <button id="circBtn" class="tool-btn" title="Circle"><i class="far fa-circle"></i></button>
        <button id="textBtn" class="tool-btn" title="Add Text"><i class="fas fa-font"></i></button>
        <button id="deleteBtn" class="tool-btn" style="color:#ff7675" title="Delete Selected"><i class="fas fa-eraser"></i></button>
        <div class="divider"></div>
        <button id="clearAll" class="tool-btn danger" title="Clear Canvas"><i class="fas fa-trash-alt"></i></button>
    </aside>

    <main class="workspace">
        <header class="options-bar">
            <div class="opt-group">
                <span>Color:</span>
                <input type="color" id="mainColor" value="#0984e3">
            </div>
            <div class="opt-group">
                <span>Size:</span>
                <input type="range" id="mainSize" min="1" max="100" value="5">
            </div>
            <div class="opt-group">
                <button id="toggleGrid">Toggle Grid</button>
            </div>
            <div class="actions">
                <button id="downloadPng" class="save-btn"><i class="fas fa-download"></i> Save Image</button>
            </div>
        </header>

        <div id="canvas-wrapper">
            <canvas id="mainCanvas"></canvas>
        </div>
    </main>
</div>

<script src="script.js"></script>
</body>
</html>
