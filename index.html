<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>SlideBoard - PowerPoint + Whiteboard</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="toolbar">
    <button class="tool-btn" id="addSlideBtn">+ New Slide</button>
    <button class="tool-btn" id="deleteSlideBtn">🗑️ Delete Slide</button>
    <button class="tool-btn" id="drawModeBtn" class="active">✏️ Draw</button>
    <button class="tool-btn" id="textModeBtn">📝 Add Text</button>
    <button class="tool-btn" id="clearBoardBtn">🧽 Clear Board</button>
    <input type="color" id="penColor" class="color-picker" value="#0000ff">
    <div class="slider-label">
        <span>Pen Size</span>
        <input type="range" id="penSize" min="1" max="20" value="3">
    </div>
    <button class="tool-btn" id="exportImageBtn">📸 Export as Image</button>
</div>

<div class="main-area">
    <div class="slides-panel" id="slidesPanel"></div>
    <div class="canvas-container" id="canvasContainer">
        <canvas id="boardCanvas"></canvas>
    </div>
</div>

<script src="js/app.js"></script>
</body>
</html>
